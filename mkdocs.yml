site_name: Photoshop Beginner's Guide
site_description: A step-by-step user guide for beginner Photoshop tasks
site_author: Your Name Here

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
  palette:
    # Dark Mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Dark mode
      primary: red
      accent: cyan
    # Light Mode
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Light mode
      primary: blue
      accent: deep orange

markdown_extensions:
  - admonition
  - pymdownx.details

nav:
  - Home: index.md
  - Instructions:
      - Effects & 3D: instructions/effects-3d.md
      - Non-Destructive Editing: instructions/non-destructive.md
      - Image Retouching: instructions/retouching.md
      - Vectors & Pen Tool: instructions/vectors.md
  - Glossary: glossary.md
  - Troubleshooting: troubleshooting.md
